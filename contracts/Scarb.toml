[package]
name = "starkpay"
version = "0.1.0"
edition = "2024_07"

[dependencies]
starknet = ">=2.9.1"
openzeppelin = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v0.20.0" }

[dev-dependencies]
snforge_std = { git = "https://github.com/foundry-rs/starknet-foundry", tag = "v0.57.0" }

[[target.starknet-contract]]
sierra = true
casm = true

[tool.snforge]
fuzzer_runs = 256
fuzzer_seed = 42
